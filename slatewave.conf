# vim:ft=kitty

## name:     Slatewave
## author:   Kevin Langley Jr.
## license:  WTFPL
## upstream: https://github.com/kevinlangleyjr/kitty-slatewave
## blurb:    Slate below, teal above. Part of the Slatewave family — getslatewave.com.

# A calm, slate-and-teal palette tuned to match the Slatewave theme family
# (VSCode, Obsidian, oh-my-posh, Ghostty, iTerm2, Alacritty, WezTerm). ANSI
# mappings mirror the VSCode theme so terminal output stays visually aligned
# across editor and terminal.


# The basic colors
foreground              #e2e8f0
background              #282c34
selection_foreground    #e2e8f0
selection_background    #334155

# Cursor colors — teal signature, slate text for legibility
cursor                  #5eead4
cursor_text_color       #282c34

# URL underline color when hovering with mouse
url_color               #38bdf8

# Kitty window border colors
active_border_color     #5eead4
inactive_border_color   #334155
bell_border_color       #fbbf24

# OS Window titlebar colors — match the slate background
wayland_titlebar_color  background
macos_titlebar_color    background

# Tab bar colors
active_tab_foreground   #282c34
active_tab_background   #5eead4
inactive_tab_foreground #cbd5e1
inactive_tab_background #282c34
tab_bar_background      #21252b

# Colors for marks (marked text in the terminal)
# Mirrors the editor's error/warning/info accents: rose, amber, sky.
mark1_foreground #282c34
mark1_background #fb7185
mark2_foreground #282c34
mark2_background #fbbf24
mark3_foreground #282c34
mark3_background #38bdf8

# The 16 terminal colors — mirrors terminal.ansi* in vscode-slatewave

# black
color0  #1e293b
color8  #475569

# red
color1  #fb7185
color9  #ef5350

# green
color2  #5eead4
color10 #99f6e4

# yellow
color3  #b45309
color11 #fbbf24

# blue
color4  #38bdf8
color12 #7dd3fc

# magenta
color5  #b388ff
color13 #c4b5fd

# cyan
color6  #0e7490
color14 #67e8f9

# white
color7  #e2e8f0
color15 #f1f5f9
