# vim:ft=kitty

## name:     Slatewave (full bundle)
## author:   Kevin Langley Jr.
## license:  WTFPL
## upstream: https://github.com/kevinlangleyjr/kitty-slatewave
## blurb:    Palette + opinionated typography/cursor/window defaults for kitty.

# Palette + opinionated typography/cursor/window defaults. Includes the base
# `slatewave.conf` for colors, then layers font (Hack Nerd Font Mono), a
# non-blinking block cursor, and a fully opaque, unblurred window — the same
# defaults used across the Slatewave family.
#
# Install note: this file assumes `slatewave.conf` lives in the same kitty
# config directory (typically `~/.config/kitty/`). If you installed it
# somewhere else, edit the include path below.

include slatewave.conf

# Font
font_family       Hack Nerd Font Mono
bold_font         auto
italic_font       auto
bold_italic_font  auto
font_size         14.0

# Cursor
cursor_shape           block
cursor_blink_interval  0

# Window
background_opacity 1.0
background_blur    0
